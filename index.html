<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cubo Rubik 3D</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f0f14;
      overflow: hidden;
    }
    #instrucciones {
      position: absolute;
      top: 15px;
      left: 15px;
      background-color: rgba(0, 0, 0, 0.85);
      color: #ffffff;
      padding: 15px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 13px;
      line-height: 1.5;
      z-index: 100; /* Asegura que flote por encima del cubo */
      pointer-events: none; /* Permite que puedas hacer clic a través del cuadro */
    }
    #instrucciones h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #fff;
    }
  </style>
</head>
<body>

  <div id="instrucciones">
    <h3> CONTROL DE LAS MANOS:</h3>
    • Usa 1 Mano (Índice) para Girar el cubo<br>
    • Usa 2 Manos para Separar / Unir cubitos
  </div>

  <script src="sketch.js"></script>

</body>
</html>
